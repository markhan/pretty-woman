<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Project Navigation</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        display: grid;
        place-items: center;
        min-height: 90vh;
        background-color: #f9fafb;
        color: #111827;
      }
      .container {
        background-color: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 0.5rem;
        padding: 2rem 3rem;
        box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin-top: 0;
        text-align: center;
      }
      ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      li {
        margin-top: 1rem;
      }
      a {
        display: block;
        padding: 0.75rem 1.5rem;
        text-align: center;
        font-size: 1.125rem;
        font-weight: 500;
        text-decoration: none;
        color: #1f2937;
        background-color: #f3f4f6;
        border-radius: 0.375rem;
        transition: background-color 0.2s;
      }
      a:hover {
        background-color: #e5e7eb;
      }
    </style>
  </head>
